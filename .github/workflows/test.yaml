name: Build and Test

on:
  pull_request:
    branches:
      - main
      - merge-queue
  merge_group:
    types:
      - checks_requested

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Log merge group SHAs
        if: github.event_name == 'merge_group'
        run: |
          echo "base_sha: ${{ github.event.merge_group.base_sha }}"
          echo "head_sha: ${{ github.event.merge_group.head_sha }}"
      - name: No-op
        run: sleep 180 && echo "no-op"

  test:
    runs-on: ubuntu-latest
    steps:
      - name: No-op
        run: sleep 180 && echo "no-op"
